<svg viewBox="58 55 284 325" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="stoneGrad" cx="50%" cy="45%" r="55%">
      <stop offset="0%"   stop-color="#ffe0a0"/>
      <stop offset="25%"  stop-color="#ff8c00"/>
      <stop offset="55%"  stop-color="#cc3a00"/>
      <stop offset="80%"  stop-color="#1a0a2e"/>
      <stop offset="100%" stop-color="#0d0618"/>
    </radialGradient>
    <radialGradient id="fireCore" cx="50%" cy="60%" r="40%">
      <stop offset="0%"  stop-color="#ffcc44" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#ff4400" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="edgeHighlight" x1="20%" y1="10%" x2="80%" y2="90%">
      <stop offset="0%"   stop-color="#ffcc88" stop-opacity="0.6"/>
      <stop offset="40%"  stop-color="#ff6600" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#110022" stop-opacity="0.0"/>
    </linearGradient>
    <filter id="circuitGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="outerAura" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="18" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="symbolGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Outer aura -->
  <ellipse cx="200" cy="250" rx="145" ry="155" fill="#ff5500" opacity="0.08" filter="url(#outerAura)"/>
  <ellipse cx="200" cy="250" rx="120" ry="130" fill="#0055ff" opacity="0.07" filter="url(#outerAura)"/>

  <!-- Stone body -->
  <polygon points="200,55 298,92 342,172 328,288 272,355 200,375 128,355 72,288 58,172 102,92"
    fill="url(#stoneGrad)" stroke="#ff6600" stroke-width="1.5" opacity="0.95"/>

  <!-- Fire warmth core -->
  <ellipse cx="200" cy="235" rx="100" ry="110" fill="url(#fireCore)" opacity="0.5"/>

  <!-- Edge shimmer -->
  <polygon points="200,55 298,92 342,172 328,288 272,355 200,375 128,355 72,288 58,172 102,92"
    fill="url(#edgeHighlight)" opacity="0.5"/>

  <!-- Circuit veins -->
  <g filter="url(#circuitGlow)" opacity="0.78">
    <line x1="118" y1="215" x2="282" y2="215" stroke="#00e5ff" stroke-width="1.2"/>
    <polyline points="148,215 148,170 174,170 174,150" stroke="#00e5ff" stroke-width="1" fill="none"/>
    <polyline points="252,215 252,170 226,170 226,150" stroke="#00e5ff" stroke-width="1" fill="none"/>
    <polyline points="153,215 153,260 128,260 128,282" stroke="#00e5ff" stroke-width="1" fill="none"/>
    <polyline points="247,215 247,260 272,260 272,282" stroke="#00e5ff" stroke-width="1" fill="none"/>
    <line x1="200" y1="145" x2="200" y2="295" stroke="#00e5ff" stroke-width="1.2"/>
    <line x1="183" y1="192" x2="217" y2="192" stroke="#00e5ff" stroke-width="0.8"/>
    <line x1="183" y1="240" x2="217" y2="240" stroke="#00e5ff" stroke-width="0.8"/>
    <circle cx="148" cy="215" r="3"   fill="#00e5ff"/>
    <circle cx="252" cy="215" r="3"   fill="#00e5ff"/>
    <circle cx="200" cy="215" r="4.5" fill="#ffffff"/>
    <circle cx="174" cy="170" r="2.5" fill="#00e5ff"/>
    <circle cx="226" cy="170" r="2.5" fill="#00e5ff"/>
    <circle cx="128" cy="282" r="2.5" fill="#00e5ff"/>
    <circle cx="272" cy="282" r="2.5" fill="#00e5ff"/>
  </g>

  <!-- Code symbol </> -->
  <g filter="url(#symbolGlow)">
    <polyline points="160,202 138,216 160,230" stroke="#00ffcc" stroke-width="3.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <polyline points="240,202 262,216 240,230" stroke="#00ffcc" stroke-width="3.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="212" y1="199" x2="188" y2="233" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>
  </g>

  <!-- Fire flame accents -->
  <g opacity="0.65" filter="url(#softGlow)">
    <path d="M173,342 Q170,322 183,312 Q176,327 188,325 Q178,337 183,347 Q176,345 173,342Z" fill="#ff8800"/>
    <path d="M200,352 Q196,327 210,315 Q202,332 215,329 Q204,343 210,354 Q204,352 200,352Z" fill="#ffaa00"/>
    <path d="M227,342 Q230,322 217,312 Q224,327 212,325 Q222,337 217,347 Q224,345 227,342Z" fill="#ff8800"/>
  </g>

  <!-- Facet lines -->
  <g stroke="#ff9944" stroke-width="0.6" opacity="0.25" fill="none">
    <line x1="200" y1="55"  x2="200" y2="375"/>
    <line x1="102" y1="92"  x2="272" y2="355"/>
    <line x1="298" y1="92"  x2="128" y2="355"/>
    <line x1="58"  y1="172" x2="342" y2="172"/>
    <line x1="58"  y1="288" x2="342" y2="288"/>
  </g>

  <!-- Stone border -->
  <polygon points="200,55 298,92 342,172 328,288 272,355 200,375 128,355 72,288 58,172 102,92"
    fill="none" stroke="#ff7722" stroke-width="2" opacity="0.85"/>
  <polygon points="200,55 298,92 342,172 328,288 272,355 200,375 128,355 72,288 58,172 102,92"
    fill="none" stroke="#ffcc88" stroke-width="0.7" opacity="0.35"/>
</svg>
